# Provenance: identity-webhook/package.json "repository.url" must be this GitHub
# repo, or npm returns E422 when verifying the sigstore bundle.
#
# npm auth: Trusted Publishing (OIDC). Configure on npmjs.com for
# pymthouse/clearinghouse-runtime and workflow filename `release.yml`. Do not set
# secrets.NPM_TOKEN on publish — it overrides OIDC and can cause EOTP.
# See identity-webhook/docs/RELEASING.md.
name: release
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.3.0)"
        required: true
        type: string

defaults:
  run:
    working-directory: identity-webhook

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: identity-webhook/package-lock.json
          registry-url: "https://registry.npmjs.org"
          scope: "@pymthouse"
      - run: npm ci
      - run: npm test
      - name: Verify package.json repository matches this repo
        run: |
          REPO_URL=$(node -p "require('./package.json').repository.url.replace(/^git\\+/, '')")
          EXPECTED="https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "$REPO_URL" != "$EXPECTED" ]; then
            echo "::error::package.json repository.url must be ${EXPECTED} for npm provenance (got ${REPO_URL})"
            exit 1
          fi
      - name: Verify tag matches package.json version
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          VER=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${VER}"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag ${TAG} does not match package.json version ${VER} (expected ${EXPECTED_TAG})"
            exit 1
          fi
      - name: Install npm CLI for trusted publishing
        run: npm install -g npm@11.5.1
      - name: Publish to npm via OIDC (trusted publishing)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-*) npm publish --access public --no-git-checks --ignore-scripts --tag rc ;;
            *)   npm publish --access public --no-git-checks --ignore-scripts ;;
          esac
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if gh release view "${TAG}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists on ${GITHUB_REPOSITORY}; skipping create."
            exit 0
          fi
          PRERELEASE_FLAG=""
          case "$VER" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac
          gh release create "${TAG}" \
            -R "${GITHUB_REPOSITORY}" \
            --title "${PKG} v${VER}" \
            --generate-notes \
            --verify-tag \
            $PRERELEASE_FLAG
