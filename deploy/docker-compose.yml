# Clearinghouse deploy stack: Redpanda + go-livepeer remote signer + OpenMeter collector.
#
# Redpanda is the Kafka-compatible broker; The signer container runs go-livepeer directly — only its signing HTTP port
# (8081) is published to the host. The CLI/admin port (-cliAddr) is bound to loopback
# inside the container and is never exposed or published.
#
# Full stack:
#   docker compose -f deploy/docker-compose.yml --env-file .env up -d --build
#
# Kafka + signer only (no metering):
#   docker compose -f deploy/docker-compose.yml --env-file .env up -d --build kafka remote-signer

x-kafka-env: &kafka-env
  KAFKA_BROKERS: ${KAFKA_BROKERS}
  KAFKA_GATEWAY_TOPIC: ${KAFKA_GATEWAY_TOPIC}

x-signer-env: &signer-env
  SIGNER_NETWORK: ${SIGNER_NETWORK}
  ETH_RPC_URL: ${ETH_RPC_URL}
  SIGNER_PORT: "8081"
  SIGNER_ETH_ADDR: ${SIGNER_ETH_ADDR:-}
  SIGNER_ETH_KEYSTORE_PATH: ${SIGNER_ETH_KEYSTORE_PATH:-}
  SIGNER_REMOTE_DISCOVERY: ${SIGNER_REMOTE_DISCOVERY:-0}
  ORCH_WEBHOOK_URL: ${ORCH_WEBHOOK_URL:-}
  LIVE_AI_CAP_REPORT_INTERVAL: ${LIVE_AI_CAP_REPORT_INTERVAL:-}

services:
  kafka:
    build:
      context: ..
      dockerfile: deploy/kafka/Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_ADVERTISED_ADDR: ${KAFKA_ADVERTISED_ADDR}
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  remote-signer:
    build:
      context: ..
      dockerfile: deploy/remote-signer/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SIGNER_HOST_PORT:-8081}:8081"
    volumes:
      - ${SIGNER_DATA_DIR:-./data}:/data
    environment:
      <<: [*signer-env, *kafka-env]
      REMOTE_SIGNER_WEBHOOK_URL: ${REMOTE_SIGNER_WEBHOOK_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}

  openmeter-collector:
    build:
      context: ..
      dockerfile: deploy/openmeter-collector/Dockerfile
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *kafka-env
      OPENMETER_INGEST_URL: ${OPENMETER_INGEST_URL}
      OPENMETER_API_KEY: ${OPENMETER_API_KEY}
      ETH_USD_PRICE: ${ETH_USD_PRICE}

  mock-services:
    profiles: ["mock"]
    build:
      context: ..
      dockerfile: deploy/mock-services/Dockerfile
    restart: unless-stopped
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      MOCK_PORT: "8080"

# Signer datadir is bind-mounted from deploy/data (see SIGNER_DATA_DIR).
# Copy keystore + .eth-password into deploy/data before first run.
